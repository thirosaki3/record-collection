<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PICHICHI records</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#111;color:#fff;min-height:100vh}

/* ヘッダー */
.header{position:sticky;top:0;z-index:100;background:#111;padding:12px 16px;border-bottom:1px solid #333}
.header h1{font-size:16px;font-weight:600;color:#fff;margin-bottom:10px;letter-spacing:.5px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:#222;border:1px solid #444;border-radius:24px;color:#fff;font-size:15px;outline:none}
.search-wrap input::placeholder{color:#666}
.search-wrap input:focus{border-color:#888}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#666;font-size:18px}
.search-clear{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#666;font-size:18px;cursor:pointer;display:none}

/* ツールバー */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px;flex-wrap:wrap}
.sort-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;background:#222;border:1px solid #444;border-radius:20px;color:#ccc;font-size:13px;cursor:pointer;transition:background .15s;white-space:nowrap}
.sort-btn:active{background:#333}
#sort-arrow{display:inline-block;transition:transform .2s;font-size:14px}

/* メンバーボタン */
.member-btns{display:flex;gap:5px;flex-wrap:wrap}
.member-btn{padding:6px 10px;background:#222;border:1px solid #555;border-radius:20px;color:#ccc;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.member-btn:active{opacity:.7}
.member-btn.active{background:#e74c3c;border-color:#e74c3c;color:#fff;font-weight:600}

/* 件数 */
.count{padding:8px 16px;font-size:12px;color:#666}

/* グリッド */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 0 80px}
@media(min-width:480px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:700px){.grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(6,1fr)}}

.card{position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;background:#222}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.card:active img{transform:scale(.96)}
.card .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555;text-align:center;padding:4px;line-height:1.3}
.card.marked::after{content:'✕';position:absolute;inset:0;background:rgba(220,50,50,.55);display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;font-weight:700}
.card.marked img{filter:brightness(.5)}

/* 削除バー */
.delete-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:#1a1a1a;border-top:1px solid #444;padding:12px 16px;gap:10px;align-items:center}
.delete-bar.visible{display:flex}
.delete-count{flex:1;font-size:14px;color:#ff6b6b;font-weight:500}
.delete-cancel{padding:10px 18px;background:#333;border:1px solid #555;border-radius:10px;color:#ccc;font-size:14px;cursor:pointer}
.delete-exec{padding:10px 18px;background:#c0392b;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}

/* モーダル共通 */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);overflow-y:auto}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:#1a1a1a;width:100%;max-width:480px;min-height:100vh;padding:0 0 40px}
@media(min-width:520px){.modal{min-height:auto;margin:40px auto;border-radius:16px;overflow:hidden}}
.modal-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-img-wrap{position:relative;background:#000}
.modal-img-wrap img{width:100%;display:block;max-height:70vw;object-fit:contain}
@media(min-width:520px){.modal-img-wrap img{max-height:320px}}
.modal-body{padding:16px}
.modal-artist{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3}
.modal-album{font-size:16px;color:#ccc;margin-bottom:4px}
.modal-artist-en{font-size:13px;color:#888;margin-bottom:12px}
.modal-meta{display:grid;gap:6px;margin-bottom:16px}
.meta-row{display:flex;gap:8px;font-size:13px}
.meta-label{color:#666;min-width:80px;flex-shrink:0}
.meta-value{color:#ccc;word-break:break-all}

/* リンクボタン */
.links{display:grid;gap:8px}
.link-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:500;transition:opacity .15s}
.link-btn:active{opacity:.7}
.link-btn .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.btn-apple{background:#1c1c1e;color:#fff;border:1px solid #333}
.btn-apple .icon{background:#fc3c44}
.btn-spotify{background:#1c1c1e;color:#fff;border:1px solid #333}
.btn-spotify .icon{background:#1db954}
.btn-youtube{background:#1c1c1e;color:#fff;border:1px solid #333}
.btn-youtube .icon{background:#ff0000}
.btn-discogs{background:#1c1c1e;color:#fff;border:1px solid #333}
.btn-discogs .icon{background:#333;font-size:11px;font-weight:700;color:#fff}
.full-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:#222;border:1px solid #444;border-radius:10px;color:#aaa;font-size:13px;text-decoration:none;margin-bottom:12px;cursor:pointer}
.mark-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:#2a1a1a;border:1px solid #663333;border-radius:10px;color:#ff6b6b;font-size:13px;cursor:pointer;margin-bottom:8px;width:100%}
.mark-btn.marked{background:#c0392b;border-color:#c0392b;color:#fff}

/* WANTEDに追加ボタン */
.wanted-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:#1a2a1a;border:1px solid #336633;border-radius:10px;color:#4caf50;font-size:13px;cursor:pointer;margin-bottom:8px;width:100%}
.wanted-add-btn:active{opacity:.7}

/* WANTEDモーダル */
.wanted-modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);overflow-y:auto}
.wanted-modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.wanted-modal{background:#1a1a1a;width:100%;max-width:480px;min-height:100vh;padding:0 0 40px;position:relative}
@media(min-width:520px){.wanted-modal{min-height:auto;margin:40px auto;border-radius:16px;overflow:hidden}}
.wanted-header{padding:16px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px}
.wanted-header h2{font-size:18px;font-weight:700;flex:1}
.wanted-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;padding:4px}

/* WANTED検索エリア */
.wanted-search-area{padding:16px;border-bottom:1px solid #222}
.wanted-search-area label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.wanted-input-row{display:flex;gap:8px;margin-bottom:10px}
.wanted-input{flex:1;padding:10px 14px;background:#222;border:1px solid #444;border-radius:10px;color:#fff;font-size:14px;outline:none}
.wanted-input:focus{border-color:#888}
.wanted-search-btn{padding:10px 16px;background:#e74c3c;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.wanted-search-btn:active{opacity:.7}

/* Discogs検索結果 */
.discogs-results{padding:0 16px;max-height:300px;overflow-y:auto}
.discogs-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #222;cursor:pointer}
.discogs-item:active{opacity:.7}
.discogs-item img{width:56px;height:56px;object-fit:cover;border-radius:6px;background:#333;flex-shrink:0}
.discogs-item-info{flex:1;min-width:0}
.discogs-item-title{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.discogs-item-sub{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.discogs-searching{text-align:center;padding:20px;color:#666;font-size:14px}

/* WANTEDリスト */
.wanted-list-area{padding:16px}
.wanted-list-area h3{font-size:14px;color:#888;margin-bottom:12px}
.wanted-item{display:flex;align-items:center;gap:12px;padding:10px;background:#222;border-radius:10px;margin-bottom:8px}
.wanted-item img{width:60px;height:60px;object-fit:cover;border-radius:8px;background:#333;flex-shrink:0}
.wanted-item-info{flex:1;min-width:0}
.wanted-item-artist{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wanted-item-album{font-size:12px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wanted-item-del{background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
.wanted-item-del:active{color:#ff6b6b}
.wanted-empty{text-align:center;padding:30px;color:#555;font-size:14px}

/* ローディング・空 */
.loading{text-align:center;padding:60px 20px;color:#666;font-size:15px}
.empty{text-align:center;padding:60px 20px;color:#555;font-size:15px}
</style>
</head>
<body>

<div class="header">
  <h1>🎵 PICHICHI records</h1>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="アーティスト名・アルバムタイトルで検索" autocomplete="off">
    <span class="search-clear" id="clear-btn">✕</span>
  </div>
  <div class="toolbar">
    <button class="sort-btn" id="sort-btn">
      <span id="sort-label">A→Z</span>
      <span id="sort-arrow">↑</span>
    </button>
    <div class="member-btns">
      <button class="member-btn" data-member="浅">浅</button>
      <button class="member-btn" data-member="伊">伊</button>
      <button class="member-btn" data-member="追">追</button>
      <button class="member-btn" data-member="J">J</button>
      <button class="member-btn" data-member="T">T</button>
      <button class="member-btn" data-member="広">広</button>
    </div>
  </div>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<div class="loading" id="loading">読み込み中...</div>
<div class="empty" id="empty" style="display:none">該当するレコードが見つかりません</div>

<!-- 削除バー -->
<div class="delete-bar" id="delete-bar">
  <span class="delete-count" id="delete-count">0件を削除対象にマーク</span>
  <button class="delete-cancel" id="delete-cancel">キャンセル</button>
  <button class="delete-exec" id="delete-exec">JSONをダウンロード</button>
</div>

<!-- レコード詳細モーダル -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt="">
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-artist" id="modal-artist"></div>
      <div class="modal-album" id="modal-album"></div>
      <div class="modal-artist-en" id="modal-artist-en"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <button class="wanted-add-btn" id="wanted-add-btn">♡ WANTED LISTに追加</button>
      <button class="mark-btn" id="mark-btn">🗑 削除対象にマーク</button>
      <a class="full-btn" id="full-img-btn" href="#" target="_blank">🔍 原寸画像を見る</a>
      <div class="links" id="modal-links"></div>
    </div>
  </div>
</div>

<!-- WANTEDモーダル -->
<div class="wanted-modal-bg" id="wanted-modal-bg">
  <div class="wanted-modal">
    <div class="wanted-header">
      <h2 id="wanted-title">🎯 WANTED LIST</h2>
      <button class="wanted-close" id="wanted-close">✕</button>
    </div>

    <!-- Discogs検索 -->
    <div class="wanted-search-area">
      <label>アーティスト名でDiscogsを検索してWANTED LISTに追加</label>
      <div class="wanted-input-row">
        <input class="wanted-input" id="wanted-artist-input" placeholder="アーティスト名（英語推奨）">
        <button class="wanted-search-btn" id="wanted-search-btn">検索</button>
      </div>
      <input class="wanted-input" id="wanted-album-input" placeholder="アルバム名で絞り込み（任意）" style="width:100%;margin-bottom:0">
    </div>
    <div class="discogs-results" id="discogs-results"></div>

    <!-- WANTEDリスト表示 -->
    <div class="wanted-list-area">
      <h3 id="wanted-list-title">WANTED LIST</h3>
      <div id="wanted-list"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Supabase設定
// ============================================================
const SUPABASE_URL = 'https://tefgzlyssgxtqvsofwjb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mbNJRAElLapjkLzhGMHkKQ_puey6TBb';
const DISCOGS_TOKEN = 'IGGtKOFztpWlvnnvIbWvRUrWlOfhgqNbsQavhTdx';

async function sbFetch(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ============================================================
// メイン変数
// ============================================================
let ALL = [], filtered = [];
const THUMB = 'thumbs/', IMAGES = 'images/';
const PAGE = 60;
let rendered = 0;
let sortOrder = 'asc';
let markedFiles = new Set();
let currentRec = null;
let currentMember = null;

// ============================================================
// 初期化
// ============================================================
async function init() {
  try {
    const r = await fetch('records.json');
    ALL = await r.json();
    document.getElementById('loading').style.display = 'none';
    updateSortBtn();
    filter('');
  } catch(e) {
    document.getElementById('loading').textContent = 'データの読み込みに失敗しました。';
  }
}

// ============================================================
// ソート
// ============================================================
function sortKey(r) { return (r.artist_en || r.artist_ja || '').toLowerCase(); }
function applySort(arr) {
  return arr.sort((a,b) => {
    const ka=sortKey(a), kb=sortKey(b);
    return sortOrder==='asc' ? ka.localeCompare(kb) : kb.localeCompare(ka);
  });
}
function updateSortBtn() {
  const btn=document.getElementById('sort-btn');
  document.getElementById('sort-label').textContent = sortOrder==='asc' ? 'A→Z' : 'Z→A';
  document.getElementById('sort-arrow').textContent = sortOrder==='asc' ? '↑' : '↓';
}
document.getElementById('sort-btn').addEventListener('click', () => {
  sortOrder = sortOrder==='asc' ? 'desc' : 'asc';
  updateSortBtn();
  filter(document.getElementById('search').value);
});

// ============================================================
// フィルター・グリッド
// ============================================================
function filter(q) {
  q = q.toLowerCase().trim();
  let base = q ? ALL.filter(r =>
    (r.artist_ja||'').toLowerCase().includes(q) ||
    (r.album_ja||'').toLowerCase().includes(q) ||
    (r.artist_en||'').toLowerCase().includes(q) ||
    (r.album_en||'').toLowerCase().includes(q) ||
    (r.label||'').toLowerCase().includes(q) ||
    (r.catalog||'').toLowerCase().includes(q)
  ) : [...ALL];
  filtered = applySort(base);
  rendered = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('count').textContent = filtered.length + ' 件';
  renderMore();
}

function renderMore() {
  const grid = document.getElementById('grid');
  const end = Math.min(rendered + PAGE, filtered.length);
  const frag = document.createDocumentFragment();
  for (let i = rendered; i < end; i++) {
    const rec = filtered[i];
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.idx = i;
    const label = rec.artist_ja || rec.artist_en || rec.filename;
    div.innerHTML = `<img src="${THUMB+rec.filename}" alt="${label}" loading="lazy"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'">
      <div class="no-img" style="display:none">${label}</div>`;
    div.addEventListener('click', () => openModal(i));
    if (markedFiles.has(rec.filename)) div.classList.add('marked');
    frag.appendChild(div);
  }
  grid.appendChild(frag);
  rendered = end;
}

window.addEventListener('scroll', () => {
  if (rendered < filtered.length &&
      window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) renderMore();
});

const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
let searchTimer;
searchEl.addEventListener('input', e => {
  clearBtn.style.display = e.target.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => filter(e.target.value), 200);
});
clearBtn.addEventListener('click', () => {
  searchEl.value = ''; clearBtn.style.display = 'none';
  filter(''); searchEl.focus();
});

// ============================================================
// レコード詳細モーダル
// ============================================================
function openModal(idx) {
  const rec = filtered[idx];
  currentRec = rec;
  document.getElementById('modal-img').src = IMAGES + rec.filename;
  document.getElementById('modal-artist').textContent = rec.artist_ja || rec.artist_en || '';
  document.getElementById('modal-album').textContent = rec.album_ja || rec.album_en || '';
  document.getElementById('modal-artist-en').textContent =
    (rec.artist_en && rec.artist_en !== (rec.artist_ja||''))
      ? rec.artist_en + (rec.album_en ? ' / ' + rec.album_en : '') : '';

  const meta = [];
  if (rec.label)   meta.push(['レーベル', rec.label]);
  if (rec.catalog) meta.push(['カタログ', rec.catalog]);
  if (rec.side && rec.side !== '不明') meta.push(['面', rec.side]);
  if (rec.discogs_id) meta.push(['Discogs', rec.discogs_id]);
  document.getElementById('modal-meta').innerHTML = meta.map(([k,v]) =>
    `<div class="meta-row"><span class="meta-label">${k}</span><span class="meta-value">${v}</span></div>`
  ).join('');

  document.getElementById('full-img-btn').href = IMAGES + rec.filename;

  const links = [];
  if (rec.apple_url)   links.push(`<a class="link-btn btn-apple" href="${rec.apple_url}" target="_blank"><span class="icon">🎵</span>Apple Musicで開く</a>`);
  if (rec.spotify_url) links.push(`<a class="link-btn btn-spotify" href="${rec.spotify_url}" target="_blank"><span class="icon">🎧</span>Spotifyで検索</a>`);
  if (rec.youtube_url) links.push(`<a class="link-btn btn-youtube" href="${rec.youtube_url}" target="_blank"><span class="icon">▶</span>YouTubeで開く</a>`);
  if (rec.discogs_url) links.push(`<a class="link-btn btn-discogs" href="${rec.discogs_url}" target="_blank"><span class="icon">D</span>Discogsで開く</a>`);
  document.getElementById('modal-links').innerHTML = links.join('');

  // 削除マーク
  const markBtn = document.getElementById('mark-btn');
  updateMarkBtn(markBtn, rec.filename);
  markBtn.onclick = () => {
    markedFiles.has(rec.filename) ? markedFiles.delete(rec.filename) : markedFiles.add(rec.filename);
    updateMarkBtn(markBtn, rec.filename);
    updateDeleteBar();
    document.querySelectorAll('.card').forEach(c => {
      if (filtered[parseInt(c.dataset.idx)]?.filename === rec.filename)
        c.classList.toggle('marked', markedFiles.has(rec.filename));
    });
  };

  // WANTED追加ボタン
  const wBtn = document.getElementById('wanted-add-btn');
  wBtn.onclick = () => {
    closeModal();
    // メンバー選択を促す
    document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
    alert('WANTEDリストに追加するメンバーボタン（浅/伊/追/J/T/広）をタップしてください。\nその後、モーダル内の「WANTED LISTに追加」を押してください。');
  };

  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateMarkBtn(btn, filename) {
  const marked = markedFiles.has(filename);
  btn.classList.toggle('marked', marked);
  btn.textContent = marked ? '✓ 削除対象から外す' : '🗑 削除対象にマーク';
}
function updateDeleteBar() {
  const bar = document.getElementById('delete-bar');
  document.getElementById('delete-count').textContent = markedFiles.size + '件を削除対象にマーク';
  bar.classList.toggle('visible', markedFiles.size > 0);
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeWanted(); } });

document.getElementById('delete-cancel').addEventListener('click', () => {
  markedFiles.clear(); updateDeleteBar();
  document.querySelectorAll('.card.marked').forEach(c => c.classList.remove('marked'));
});
document.getElementById('delete-exec').addEventListener('click', () => {
  if (!markedFiles.size) return;
  if (!confirm(markedFiles.size + '件を削除したrecords.jsonをダウンロードします。')) return;
  const newData = ALL.filter(r => !markedFiles.has(r.filename));
  const blob = new Blob([JSON.stringify(newData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'records.json';
  a.click();
});

// ============================================================
// メンバーボタン → WANTEDモーダル
// ============================================================
document.querySelectorAll('.member-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const member = btn.dataset.member;
    // アクティブ状態切り替え
    document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMember = member;
    openWanted(member);
  });
});

async function openWanted(member) {
  document.getElementById('wanted-title').textContent = '🎯 ' + member + ' の WANTED LIST';
  document.getElementById('wanted-list-title').textContent = member + ' のWANTED LIST';
  document.getElementById('discogs-results').innerHTML = '';
  document.getElementById('wanted-artist-input').value = '';
  document.getElementById('wanted-album-input').value = '';
  document.getElementById('wanted-modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';

  // WANTEDリストをSupabaseから取得
  await loadWantedList(member);

  // currentRecがある場合、直接追加オプションを表示
  if (currentRec) {
    showAddCurrentRec(member);
  }
}

function showAddCurrentRec(member) {
  const rec = currentRec;
  const area = document.getElementById('wanted-search-area');
  const existingQuick = document.getElementById('quick-add-area');
  if (existingQuick) existingQuick.remove();

  const div = document.createElement('div');
  div.id = 'quick-add-area';
  div.style.cssText = 'padding:12px 16px;background:#1a2a1a;border-bottom:1px solid #2a3a2a';
  div.innerHTML = `
    <div style="font-size:12px;color:#4caf50;margin-bottom:8px">📀 このアルバムを追加しますか？</div>
    <div style="display:flex;align-items:center;gap:10px">
      <img src="${IMAGES+rec.filename}" style="width:48px;height:48px;object-fit:cover;border-radius:6px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${rec.artist_en||rec.artist_ja||''}</div>
        <div style="font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${rec.album_en||rec.album_ja||''}</div>
      </div>
      <button onclick="addToWanted('${member}', ${JSON.stringify(rec).replace(/'/g,"\\'")})"
        style="padding:8px 14px;background:#4caf50;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">
        追加
      </button>
    </div>`;
  area.parentNode.insertBefore(div, area);
}

async function addToWanted(member, rec) {
  const imageUrl = IMAGES + rec.filename;
  try {
    await sbFetch('wanted_list', {
      method: 'POST',
      body: JSON.stringify({
        member,
        artist_en: rec.artist_en || '',
        artist_ja: rec.artist_ja || '',
        album_en:  rec.album_en  || '',
        album_ja:  rec.album_ja  || '',
        discogs_id:  rec.discogs_id  || '',
        discogs_url: rec.discogs_url || '',
        image_url:   imageUrl,
        catalog: rec.catalog || '',
        label:   rec.label   || '',
      })
    });
    currentRec = null;
    const q = document.getElementById('quick-add-area');
    if (q) q.remove();
    await loadWantedList(member);
    alert('WANTED LISTに追加しました！');
  } catch(e) {
    alert('追加に失敗しました: ' + e.message);
  }
}

// ============================================================
// Discogs検索
// ============================================================
document.getElementById('wanted-search-btn').addEventListener('click', searchDiscogs);
document.getElementById('wanted-artist-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchDiscogs();
});

async function searchDiscogs() {
  const artist = document.getElementById('wanted-artist-input').value.trim();
  const album  = document.getElementById('wanted-album-input').value.trim();
  if (!artist) { alert('アーティスト名を入力してください'); return; }

  const resultsEl = document.getElementById('discogs-results');
  resultsEl.innerHTML = '<div class="discogs-searching">Discogsを検索中...</div>';

  try {
    const params = new URLSearchParams({
      artist, type: 'release', per_page: 10,
      token: DISCOGS_TOKEN
    });
    if (album) params.set('release_title', album);

    const res = await fetch(`https://api.discogs.com/database/search?${params}`, {
      headers: {'User-Agent': 'PICHICHIrecords/1.0'}
    });
    const data = await res.json();
    const results = data.results || [];

    if (!results.length) {
      resultsEl.innerHTML = '<div class="discogs-searching">見つかりませんでした</div>';
      return;
    }

    resultsEl.innerHTML = results.map((r,i) => `
      <div class="discogs-item" data-idx="${i}">
        <img src="${r.cover_image||''}" alt="" onerror="this.src=''">
        <div class="discogs-item-info">
          <div class="discogs-item-title">${r.title||''}</div>
          <div class="discogs-item-sub">${r.year||''} ${r.label?r.label[0]||'':''} ${r.catno||''}</div>
        </div>
      </div>
    `).join('');

    // クリックでWANTEDに追加
    resultsEl.querySelectorAll('.discogs-item').forEach((el, i) => {
      el.addEventListener('click', async () => {
        const r = results[i];
        const [artistName, albumName] = (r.title||'').split(' - ');
        try {
          await sbFetch('wanted_list', {
            method: 'POST',
            body: JSON.stringify({
              member: currentMember,
              artist_en: artistName || r.title || '',
              artist_ja: '',
              album_en:  albumName || '',
              album_ja:  '',
              discogs_id:  String(r.id||''),
              discogs_url: `https://www.discogs.com/release/${r.id}`,
              image_url:   r.cover_image || '',
              catalog: r.catno || '',
              label:   r.label ? r.label[0] : '',
            })
          });
          resultsEl.innerHTML = '';
          await loadWantedList(currentMember);
          alert('WANTED LISTに追加しました！');
        } catch(e) {
          alert('追加に失敗しました: ' + e.message);
        }
      });
    });
  } catch(e) {
    resultsEl.innerHTML = '<div class="discogs-searching">検索エラー: ' + e.message + '</div>';
  }
}

// ============================================================
// WANTEDリスト表示・削除
// ============================================================
async function loadWantedList(member) {
  const listEl = document.getElementById('wanted-list');
  listEl.innerHTML = '<div class="wanted-empty">読み込み中...</div>';
  try {
    const data = await sbFetch(`wanted_list?member=eq.${encodeURIComponent(member)}&order=created_at.desc`);
    if (!data.length) {
      listEl.innerHTML = '<div class="wanted-empty">まだリストにアルバムがありません</div>';
      return;
    }
    listEl.innerHTML = data.map(item => `
      <div class="wanted-item">
        <img src="${item.image_url||''}" alt="" onerror="this.src=''">
        <div class="wanted-item-info">
          <div class="wanted-item-artist">${item.artist_en||item.artist_ja||''}</div>
          <div class="wanted-item-album">${item.album_en||item.album_ja||''}</div>
          ${item.discogs_url ? `<a href="${item.discogs_url}" target="_blank" style="font-size:11px;color:#888">Discogs</a>` : ''}
        </div>
        <button class="wanted-item-del" onclick="deleteWanted('${item.id}', '${member}')">🗑</button>
      </div>
    `).join('');
  } catch(e) {
    listEl.innerHTML = '<div class="wanted-empty">読み込みエラー: ' + e.message + '</div>';
  }
}

async function deleteWanted(id, member) {
  if (!confirm('このアルバムをWANTED LISTから削除しますか？')) return;
  try {
    await sbFetch(`wanted_list?id=eq.${id}`, {method:'DELETE'});
    await loadWantedList(member);
  } catch(e) {
    alert('削除に失敗しました: ' + e.message);
  }
}

function closeWanted() {
  document.getElementById('wanted-modal-bg').classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
  currentMember = null;
  currentRec = null;
  const q = document.getElementById('quick-add-area');
  if (q) q.remove();
}

document.getElementById('wanted-close').addEventListener('click', closeWanted);
document.getElementById('wanted-modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('wanted-modal-bg')) closeWanted();
});

init();
</script>
</body>
</html>
